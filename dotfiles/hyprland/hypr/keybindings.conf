###################
### KEYBINDINGS ###
###################

$mainMod = ALT
$terminal = kitty
$launcher = ~/.config/rofi/bin/apps.sh
$powermenu = ~/.config/rofi/bin/powermenu.sh
$clipboard = ~/.config/rofi/bin/clipboard.sh

# -----------------------------------------------------
# Applications
# -----------------------------------------------------
bind = $mainMod CTRL, RETURN, exec, $launcher
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod CTRL, Q, exec, $powermenu
bind = $mainMod CTRL, V, exec, $clipboard

# screenshot
bind =, Print, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of the region taken" -t 1000 # region 
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of whole screen taken" -t 1000 # whole screen

# -----------------------------------------------------
# Windows
# -----------------------------------------------------

# Move window (J/K use smart-move script to toggle split when at edge)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
# bind = $mainMod SHIFT, J, movewindow, d
# bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, exec, ~/.config/hypr/scripts/smart-move.sh d
bind = $mainMod SHIFT, K, exec, ~/.config/hypr/scripts/smart-move.sh u
bindm = $mainMod, mouse:272, movewindow # Move window with the mouse

# Kill active window
bind = $mainMod, Q, killactive
bind = $mainMod, F4, killactive

bind = $mainMod, F, fullscreen # Set active window to fullscreen
bind = $mainMod, SPACE, togglefloating # Toggle active window into floating mode
bind = $mainMod SHIFT, I, layoutmsg, togglesplit
bind = $mainMod SHIFT, O, layoutmsg, swapsplit

# Move window focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resize window
bindm = $mainMod, mouse:273, resizewindow # Resize window with the mouse
bind = $mainMod SHIFT, right, resizeactive, 100 0 # Increase window width with keyboard
bind = $mainMod SHIFT, left, resizeactive, -100 0 # Reduce window width with keyboard
bind = $mainMod SHIFT, down, resizeactive, 0 100 # Increase window height with keyboard
bind = $mainMod SHIFT, up, resizeactive, 0 -100 # Reduce window height with keyboard

# Window groups
bind = $mainMod, G, togglegroup # Toggle window group
bind = $mainMod, I, changegroupactive, b # Move focus on prev tab in group (TODO)
bind = $mainMod, O, changegroupactive, f # Move focus on next tab in group (TODO)
bind = $mainMod, A, movewindoworgroup, l # Move window in/out of group
bind = $mainMod, S, movewindoworgroup, d # Move window in/out of group
bind = $mainMod, W, movewindoworgroup, u # Move window in/out of group
bind = $mainMod, D, movewindoworgroup, r # Move window in/out of group

# -----------------------------------------------------
# Workspaces
# -----------------------------------------------------

# Temporary workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, ghost # "ghost" is a label
bind = $mainMod SHIFT, S, movetoworkspace, special:ghost

# Open workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move workspace to monitor
bind = $mainMod CTRL, H, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL, L, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL, J, movecurrentworkspacetomonitor, d
bind = $mainMod CTRL, K, movecurrentworkspacetomonitor, u

# Cycle trough workspaces on active monitor
bind = $mainMod, Tab, workspace, m+1
bind = $mainMod SHIFT, Tab, workspace, m-1

# Open next empty workspace
bind = $mainMod, N, workspace, empty

# -----------------------------------------------------
# Fn keys
# -----------------------------------------------------

# Volume Control
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Toggle microphone
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Audio controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Brightness control
bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10% # Increase brightness by 10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%- # Reduce brightness by 10%

